version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mars-colony-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mars-network

  redis:
    image: redis:7-alpine
    container_name: mars-colony-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mars-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mars-colony-server
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3001
      TURN_TIMEOUT: 30000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - mars-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mars-colony-frontend
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001
    volumes:
      - ./frontend/out:/app/out
    networks:
      - mars-network

  nginx:
    image: nginx:alpine
    container_name: mars-colony-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/out:/usr/share/nginx/html:ro
    command: ["/bin/sh", "-c", "rm -f /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"]
    depends_on:
      - server
      - frontend
    networks:
      - mars-network

volumes:
  postgres-data:
  redis-data:

networks:
  mars-network:
    driver: bridge
